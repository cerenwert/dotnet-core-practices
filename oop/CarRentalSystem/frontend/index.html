<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Car Rental System</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>Araç Kiralama Sistemi</h1>
    <div class="form-container">
        <h2>Araç Kirala</h2>
        <form id="rentForm">
            <label for="customerName">Müşteri Adı:</label>
            <input type="text" id="customerName" name="customerName" required>

            <label for="carModel">Araç Modeli:</label>
            <input type="text" id="carModel" name="carModel" required>

            <label for="rentalDays">Kiralama Günleri:</label>
            <input type="number" id="rentalDays" name="rentalDays" required>

            <button type="submit">Araç Kirala</button>
        </form>
    </div>

    <div class="form-container">
        <h2>Araç İade Et</h2>
        <form id="returnForm">
            <label for="rentalId">Kiralama ID:</label>
            <input type="text" id="rentalId" name="rentalId" required>

            <button type="submit">Araç İade Et</button>
        </form>
    </div>

    <div class="status-container">
        <h2>Kiralama Durumu</h2>
        <div id="rentalStatus"></div>
    </div>
</body>
